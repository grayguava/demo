name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.bump.outputs.version }}
      upload_url: ${{ steps.draft.outputs.upload_url }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # ← required to see all tags

      - name: Bump version from latest tag
        id: bump
        run: |
          # Get latest tag, strip the leading 'v', fallback to 0.0.0 if no tags exist
          LATEST=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n1)
          CURRENT=${LATEST#v}
          CURRENT=${CURRENT:-0.0.0}

          MAJOR=$(echo $CURRENT | cut -d. -f1)
          MINOR=$(echo $CURRENT | cut -d. -f2)
          PATCH=$(echo $CURRENT | cut -d. -f3)

          if [ "${{ inputs.bump }}" = "major" ]; then
            MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
          elif [ "${{ inputs.bump }}" = "minor" ]; then
            MINOR=$((MINOR + 1)); PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi

          NEW="$MAJOR.$MINOR.$PATCH"
          echo "version=$NEW" >> $GITHUB_OUTPUT
          echo "Bumping $CURRENT → $NEW"

      - name: Update version.txt
        run: |
          echo "${{ steps.bump.outputs.version }}" > version.txt

      - name: Commit and tag new version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.txt
          git commit -m "release: v${{ steps.bump.outputs.version }}"
          git tag "v${{ steps.bump.outputs.version }}"
          git push origin main --tags

      - name: Create draft release
        id: draft
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump.outputs.version }}
          name: v${{ steps.bump.outputs.version }}
          draft: true
          generate_release_notes: true

  trigger-builds:
    needs: create-release
    runs-on: ubuntu-latest
    permissions:
      actions: write
    strategy:
      matrix:
        workflow: [build-windows.yml, build-macos.yml, build-linux.yml]
    steps:
      - name: Trigger ${{ matrix.workflow }}
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: '${{ matrix.workflow }}',
              ref: 'v${{ needs.create-release.outputs.version }}',
              inputs: {
                version: '${{ needs.create-release.outputs.version }}',
                upload_url: '${{ needs.create-release.outputs.upload_url }}'
              }
            })