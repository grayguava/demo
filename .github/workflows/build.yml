name: Build

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: fsf.exe
          - os: macos-latest
            artifact: fsf
          - os: ubuntu-latest
            artifact: fsf

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller keyring

      - name: Build executable
        run: |
          SEP=$([ "$RUNNER_OS" = "Windows" ] && echo ";" || echo ":")
          pyinstaller --onefile --name fsf --console \
            --paths . \
            --add-data "version.txt${SEP}." \
            cli/fsf.py
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fsf-${{ matrix.os }}
          path: dist/${{ matrix.artifact }}