name: Build macOS

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version string (e.g. 2.0.1)'
        required: true
      upload_url:
        description: 'Release upload URL'
        required: true

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ inputs.version }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install -e .

      - name: Build binary
        run: pyinstaller fsf.spec

      - name: Build .pkg installer
        run: |
          mkdir -p pkg-root/usr/local/bin
          cp dist/fsf pkg-root/usr/local/bin/fsf
          chmod +x pkg-root/usr/local/bin/fsf
          pkgbuild \
            --root pkg-root \
            --identifier com.yourname.formseal-fetch \
            --version "${{ inputs.version }}" \
            --install-location / \
            "formseal-fetch-v${{ inputs.version }}-macos.pkg"

      - name: Upload to release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ inputs.upload_url }}
          asset_path: formseal-fetch-v${{ inputs.version }}-macos.pkg
          asset_name: formseal-fetch-v${{ inputs.version }}-macos.pkg
          asset_content_type: application/octet-stream