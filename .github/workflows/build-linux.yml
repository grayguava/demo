name: Build Linux

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version string (e.g. 2.0.1)'
        required: true
      upload_url:
        description: 'Release upload URL'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ inputs.version }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install -e .

      - name: Build binary
        run: pyinstaller fsf.spec

      - name: Package as tarball
        run: |
          mkdir -p release/usr/local/bin
          cp dist/fsf release/usr/local/bin/fsf
          chmod +x release/usr/local/bin/fsf
          tar -czvf \
            "formseal-fetch-v${{ inputs.version }}-linux.tar.gz" \
            -C release .

      - name: Upload to release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ inputs.upload_url }}
          asset_path: formseal-fetch-v${{ inputs.version }}-linux.tar.gz
          asset_name: formseal-fetch-v${{ inputs.version }}-linux.tar.gz
          asset_content_type: application/gzip