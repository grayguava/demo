name: build

on:
  push:
    branches:
      - main
    paths:
      - 'tray/**'
      - 'go.mod'
  pull_request:
    paths:
      - 'tray/**'
      - 'go.mod'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log runtime token availability
        run: |
          echo "GitHub token available: ${{ github.token != '' }}"
          echo "Repository: ${{ github.repository }}"
          echo "Ref: ${{ github.ref }}"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Log Go version
        run: |
          go version
          echo "GOOS=$GOOS"
          echo "GOARCH=$GOARCH"

      - name: Download dependencies
        run: |
          go mod tidy
          go mod download
        working-directory: .
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Windows
        run: go build -ldflags="-s -w -H=windowsgui" -o formseal-sync.exe ./tray
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: formseal-sync-windows
          path: formseal-sync.exe

      - name: Print build output
        run: |
          dir formseal-sync.exe
          echo Build completed successfully!