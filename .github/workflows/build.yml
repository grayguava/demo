name: build

on:
  push:
    branches: [main]
    paths:
      - 'tray/**'
      - 'go.mod'
  pull_request:
    paths:
      - 'tray/**'
      - 'go.mod'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Download dependencies
        run: go mod download

      - name: Build Windows
        run: |
          GOOS=windows GOARCH=amd64 go build -o formseal-sync.exe

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: formseal-sync.exe
          retention-days: 1