name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Download dependencies
        run: go get github.com/lxn/walk@v0.0.0-20210112085537-c389da54e794

      - name: Build
        run: go build -ldflags "-s -w" -o formseal-sync.exe .

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            formseal-sync.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}