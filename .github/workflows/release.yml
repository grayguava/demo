name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Build standalone exe
        run: |
          pip install pyinstaller
          pyinstaller --onefile --name formseal-sync cli/fscl.py --collect-all commands --hidden-import requests

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            dist/formseal-sync.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}