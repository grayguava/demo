<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>formseal-sync</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div id="app">
      <!-- titlebar -->
      <div class="titlebar" data-tauri-drag-region>
        <span class="app-name">formseal-sync</span>
        <div class="win-controls">
          <button id="btn-minimize">&#8211;</button>
          <button id="btn-close">&#x2715;</button>
        </div>
      </div>

      <!-- nav -->
      <nav class="nav">
        <button class="nav-tab active" data-tab="home">Home</button>
        <button class="nav-tab" data-tab="settings">Settings</button>
      </nav>

      <!-- home -->
      <div class="tab-content active" id="tab-home">
        <div class="stat-grid">
          <div class="stat">
            <div class="stat-val" id="stat-total">—</div>
            <div class="stat-lbl">ciphertexts stored</div>
          </div>
          <div class="stat">
            <div class="stat-val" id="stat-new">—</div>
            <div class="stat-lbl">new since last fetch</div>
          </div>
        </div>

        <div class="status-row">
          <span class="badge" id="status-badge">idle</span>
          <span class="ts" id="status-ts"></span>
        </div>

        <button class="fetch-btn" id="btn-fetch">Fetch now</button>

        <div class="log" id="log">
          <div class="log-line dim">Ready.</div>
        </div>
      </div>

      <!-- settings -->
      <div class="tab-content" id="tab-settings">
        <div class="section-title">Provider</div>
        <div class="field-group">
          <label for="provider">Select provider</label>
          <select id="provider">
            <option value="">-- Select --</option>
            <option value="cloudflare">Cloudflare KV</option>
            <option value="supabase">Supabase DB</option>
          </select>
        </div>

        <!-- Cloudflare fields -->
        <div id="cf-fields" style="display: none;">
          <div class="section-title">Cloudflare</div>
          <div class="field-group">
            <label for="cf-token">API Token</label>
            <input id="cf-token" type="password" placeholder="cfut_..." autocomplete="off" />
          </div>
          <div class="field-group">
            <label for="cf-namespace">KV Namespace ID</label>
            <input id="cf-namespace" type="text" placeholder="0f2b2dcf..." autocomplete="off" />
          </div>
        </div>

        <!-- Supabase fields -->
        <div id="su-fields" style="display: none;">
          <div class="section-title">Supabase</div>
          <div class="field-group">
            <label for="su-url">Project URL</label>
            <input id="su-url" type="text" placeholder="https://xxx.supabase.co" autocomplete="off" />
          </div>
          <div class="field-group">
            <label for="su-key">Service Key</label>
            <input id="su-key" type="password" placeholder="eyJ..." autocomplete="off" />
          </div>
          <div class="field-group">
            <label for="su-table">Table name</label>
            <input id="su-table" type="text" placeholder="ciphertexts" autocomplete="off" />
          </div>
        </div>

        <div class="section-title" style="margin-top: 20px;">Output</div>
        <div class="field-group">
          <label for="output-folder">Output folder</label>
          <div class="folder-row">
            <input id="output-folder" type="text" placeholder="C:\Users\..." readonly />
            <button class="folder-btn" id="btn-browse">Browse</button>
          </div>
        </div>

        <button class="save-btn" id="btn-save">Save</button>
        <div class="save-msg" id="save-msg"></div>
      </div>
    </div>

    <script type="module" src="/main.ts"></script>
  </body>
</html>
